global_constraints:
  allowed_patterns:
    - "Use Cobra flag parsing for command arguments"
    - "Interactive selection when flags omitted"
    - "Clear success messages with context"
    - "Formatted output for list command"
    - "Follow Unix CLI conventions"
  forbidden_patterns:
    - "Required flags without defaults or prompts"
    - "Cryptic error messages"
    - "Unformatted JSON dumps"
    - "Silent modifications"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - go fmt ./...
      - go vet ./...
      - go test ./...
  - stage: task-completion
    criteria:
      - All tests passing
      - Commands follow Unix conventions
      - Help text is comprehensive
      - Interactive mode works smoothly

tasks:
  - id: m5-001
    name: Implement add command with flag parsing
    description: |
      Create add command that accepts rule content, title, and target file
      via flags with validation and error handling.
    estimate_minutes: 90
    type: code
    dependencies: []
    files:
      create:
        - internal/commands/add.go
        - internal/commands/add_test.go
      modify:
        - internal/commands/root.go
    instructions: |
      **Objective:**
      Implement add command for quick rule addition

      **Implementation Steps:**
      1. Create add command with Cobra:
         - Use: "add [rule-content]"
         - Short: "Add a new instruction rule"
         - Args: cobra.ExactArgs(1) for rule content
         - Flags:
           --title string: Optional heading for rule
           --rule string: Target rule file (e.g., "global", "testing")
      2. Implement validation:
         - Rule content must not be empty
         - If --rule provided, validate file exists
         - If --rule omitted, will prompt interactively
      3. Add success message showing:
         - Rule added to which file
         - Reminder to run build command
      4. Write tests for flag parsing

      **Constraints:**
      - Follow FR-5 specification: business-requirements.yaml:120-133
      - Accept content as positional argument
      - Flags use double-dash (--title not -t)
      - Clear error messages for validation failures
      - See: docs/style-anchors/cobra-command-structure.md for command structure

      **TDD Checklist:**
      - [ ] Write test for command creation
      - [ ] Implement add command structure
      - [ ] Test flag parsing
      - [ ] Test validation logic
      - [ ] All tests passing

      **Validation:**
      ```bash
      go test ./internal/commands -v -run TestAdd
      ```
      Expected: Add command parses flags correctly

    validation:
      commands:
        - go test ./internal/commands -v -run TestAdd
      expected_output: "PASS"
      on_failure: "Check add command flag parsing"

  - id: m5-002
    name: Add interactive rule file selection
    description: |
      Implement interactive prompt to select target rule file when --rule
      flag is omitted, showing available rule files.
    estimate_minutes: 75
    type: code
    dependencies: [m5-001]
    files:
      modify:
        - internal/commands/add.go
        - internal/commands/add_test.go
      create:
        - internal/commands/interactive.go
        - internal/commands/interactive_test.go
    instructions: |
      **Objective:**
      Add interactive rule file selection for better UX

      **Implementation Steps:**
      1. Implement ListRuleFiles(rulesDir string) ([]string, error):
         - Scan .agent-instruction/rules/ directory
         - Return list of .json files (without extension)
      2. Implement PromptRuleFile(available []string) (string, error):
         - Display numbered list of available rule files
         - Prompt: "Select rule file (1-N): "
         - Validate selection
         - Return chosen file name
      3. Integrate into add command:
         - If --rule flag empty, call interactive selection
         - Use selected file for adding rule
      4. Write tests with mocked input

      **Constraints:**
      - Only show .json files from rules directory
      - Number from 1 (not 0) for user friendliness
      - Validate numeric input
      - Allow cancellation (Ctrl-C)

      **TDD Checklist:**
      - [ ] Write test for ListRuleFiles
      - [ ] Implement file listing
      - [ ] Test interactive prompt (mocked)
      - [ ] Test integration with add command
      - [ ] All tests passing

      **Validation:**
      ```bash
      go test ./internal/commands -v -run TestInteractive
      ```
      Expected: Interactive selection works correctly

    validation:
      commands:
        - go test ./internal/commands -v -run TestInteractive
      expected_output: "PASS"
      on_failure: "Review interactive logic"

  - id: m5-003
    name: Implement rule addition logic
    description: |
      Build service method to append instruction to existing rule file,
      preserving structure and using atomic writes.
    estimate_minutes: 75
    type: code
    dependencies: [m5-002]
    files:
      modify:
        - internal/rules/service.go
        - internal/rules/service_test.go
    instructions: |
      **Objective:**
      Add instruction to rule file safely and atomically

      **Implementation Steps:**
      1. Implement AddInstruction method (if not exists from m2-005):
         - Load existing rule file
         - Create new Instruction from params
         - Append to instructions array
         - Save atomically
      2. Handle missing optional fields (heading, references)
      3. Preserve existing file structure
      4. Write tests verifying:
         - Instruction added correctly
         - Existing instructions preserved
         - JSON formatted properly
         - Atomic write used

      **Constraints:**
      - Use atomic writes
      - Preserve all existing data
      - Format JSON with indentation
      - Return error if file doesn't exist
      - See: docs/style-anchors/json-config-handling.md for JSON save patterns

      **TDD Checklist:**
      - [ ] Write test for adding instruction
      - [ ] Implement AddInstruction logic
      - [ ] Test preservation of existing data
      - [ ] Test optional fields
      - [ ] All tests passing

      **Validation:**
      ```bash
      go test ./internal/rules -v -run TestAddInstruction
      ```
      Expected: Instructions added correctly

    validation:
      commands:
        - go test ./internal/rules -v -run TestAddInstruction
      expected_output: "PASS"
      on_failure: "Check addition logic"

