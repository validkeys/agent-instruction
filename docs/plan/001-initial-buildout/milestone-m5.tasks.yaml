         - Get target rule file (flag or interactive)
         - Construct full path to rule file
         - Call RuleService.AddInstruction
         - Display success message
         - Suggest running build command
      2. Add comprehensive error handling
      3. Write integration tests end-to-end

      **Constraints:**
      - Initialize services once
      - Clear error messages with context
      - Success message includes next steps
      - Handle all error cases gracefully

      **TDD Checklist:**
      - [ ] Write test for full add workflow
      - [ ] Integrate services
      - [ ] Test error paths
      - [ ] Test success message
      - [ ] All tests passing

      **Validation:**
      ```bash
