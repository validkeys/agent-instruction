    validation:
      commands:
        - go test ./internal/commands -v -run TestAddIntegration
      expected_output: "PASS"
      on_failure: "Fix integration issues"

  - id: m5-005
    name: Implement list command with formatted output
    description: |
      Create list command that displays all rule files and their contents
      in a clear, readable format.
    estimate_minutes: 90
    type: code
    dependencies: []
