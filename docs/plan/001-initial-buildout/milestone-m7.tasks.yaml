milestone: m7
name: Testing, Documentation & Polish
generated: "2026-04-13T00:00:00Z"

style_anchors:
  - path: docs/style-anchors/table-driven-testing.md
    description: |
      Comprehensive testing patterns for achieving 80% coverage including
      edge cases, error paths, and integration scenarios.
  - path: docs/style-anchors/cobra-command-structure.md
    description: |
      Reference for testing command execution and output validation.
  - path: docs/style-anchors/file-operations.md
    description: |
      Reference for testing file operations with temp directories.
  - path: docs/style-anchors/error-handling.md
    description: |
      Reference for testing error scenarios and messages.

global_constraints:
  allowed_patterns:
    - "Table-driven tests following Go conventions"
    - "Comprehensive documentation with examples"
    - "GitHub Actions for CI/CD"
    - "golangci-lint for code quality"
    - "Clear contribution guidelines"
  forbidden_patterns:
    - "Incomplete test coverage"
    - "Missing documentation"
    - "No CI/CD pipeline"
    - "Hardcoded values in tests"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - go fmt ./...
      - go vet ./...
      - go test ./...
      - golangci-lint run
  - stage: milestone-completion
    criteria:
      - Test coverage above 80%
      - All linters pass
      - Documentation complete
      - CI/CD pipeline working
      - All examples functional

tasks:
  - id: m7-001
    name: Achieve 80% test coverage
    description: |
      Add missing tests to reach 80% coverage threshold, focusing on
      untested edge cases and error paths.
    estimate_minutes: 120
    type: test
    dependencies: []
    files:
      modify:
        - internal/*/\*_test.go
      create:
        - coverage.html
    instructions: |
      **Objective:**
      Ensure comprehensive test coverage across all packages

      **Implementation Steps:**
      1. Run coverage analysis:
         ```bash
         go test ./... -coverprofile=coverage.out
         go tool cover -html=coverage.out -o coverage.html
         ```
      2. Identify packages below 80% coverage
      3. Add missing tests for:
         - Error paths
         - Edge cases
         - Validation logic
         - Integration scenarios
      4. Focus on critical paths first:
         - File operations (atomic writes, backups)
         - Import resolution (cycle detection)
         - Build workflow
         - Command execution
      5. Verify coverage target reached

      **Constraints:**
      - Use table-driven tests
      - Test both success and failure paths
      - Mock external dependencies
      - Realistic test scenarios
      - See: docs/style-anchors/table-driven-testing.md for all test patterns

      **TDD Checklist:**
      - [ ] Generate coverage report
      - [ ] Identify coverage gaps
      - [ ] Add tests for critical paths
      - [ ] Add tests for edge cases
      - [ ] Verify 80% coverage achieved
      - [ ] All tests passing

      **Code Review:**
      Run golang-design-patterns skill to review test implementations:
      ```bash
      /golang-design-patterns internal/*/*_test.go
      ```
      Document findings in code-reviews/[yyyy-mm-dd]-{n}.yaml

      **Validation:**
      ```bash
      go test ./... -cover
      ```
      Expected: Coverage above 80%

    validation:
      commands:
        - go test ./... -coverprofile=coverage.out
        - go tool cover -func=coverage.out
      expected_output: "Total coverage above 80%"
      on_failure: "Add more tests to reach threshold"

  - id: m7-002
    name: Set up golangci-lint configuration
    description: |
      Configure golangci-lint with appropriate linters and settings for
      the project, addressing all linting issues.
    estimate_minutes: 75
    type: config
    dependencies: []
    files:
      create:
        - .golangci.yml
    instructions: |
      **Objective:**
      Configure comprehensive linting for code quality

      **Implementation Steps:**
      1. Create .golangci.yml with:
         - Enable linters: gofmt, govet, staticcheck, gosec, errcheck
         - Configure severity levels
         - Set timeout appropriately
         - Exclude generated files
         - Configure per-linter settings
      2. Run linter and fix issues:
         ```bash
         golangci-lint run
         ```
      3. Address common issues:
         - Unused variables/imports
         - Error handling
         - Security concerns
         - Code complexity
      4. Update code to pass all linters
      5. Document any disabled rules with rationale

      **Constraints:**
      - Use strict settings appropriate for CLI tool
      - Fix all issues (don't just disable)
      - Document exceptions
      - Enable gosec for security

      **Validation:**
      ```bash
      golangci-lint run
      ```
      Expected: No issues found

    validation:
      commands:
        - golangci-lint run
      expected_output: "No issues"
      on_failure: "Fix linting issues"

