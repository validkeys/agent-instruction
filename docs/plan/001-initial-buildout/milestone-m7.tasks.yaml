  - id: m7-004
    name: Set up GitHub Actions CI/CD pipeline
    description: |
      Create comprehensive CI/CD workflow with testing, linting, security
      scanning, and binary building.
    estimate_minutes: 90
    type: config
    dependencies: []
    files:
      create:
        - .github/workflows/ci.yml
        - .github/workflows/release.yml
    instructions: |
      **Objective:**
      Automate testing, quality checks, and releases

      **Implementation Steps:**
      1. Create .github/workflows/ci.yml:
         - Trigger: push, pull_request
         - Jobs:
           - test: Run tests with coverage upload
           - lint: Run golangci-lint
           - security: Run gosec
           - build: Build binary for multiple platforms
         - Use Go 1.21
         - Cache dependencies
         - Upload coverage to codecov (optional)
      2. Create .github/workflows/release.yml:
         - Trigger: tag push (v*)
         - Build binaries for:
           - macOS (amd64, arm64)
           - Linux (amd64, arm64)
         - Create GitHub release
         - Upload binary artifacts
      3. Test workflow with dry-run
      4. Document CI/CD process

      **Constraints:**
      - Follow spec: technical-requirements.yaml:226-272
      - Cache for faster builds
      - Run all quality gates
      - Cross-platform builds

      **Validation:**
      ```bash
      cat .github/workflows/ci.yml
      ```
      Expected: Valid GitHub Actions workflow

    validation:
      commands:
        - test -f .github/workflows/ci.yml
        - test -f .github/workflows/release.yml
      expected_output: "Workflow files created"
      on_failure: "Create missing workflows"

