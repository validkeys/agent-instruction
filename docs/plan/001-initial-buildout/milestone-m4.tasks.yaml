milestone: m4
name: Build Command Implementation
generated: "2026-04-13T00:00:00Z"

style_anchors:
  - path: docs/style-anchors/cobra-command-structure.md
    description: |
      Build command structure with flags for parallel processing and dry-run.
  - path: docs/style-anchors/file-operations.md
    description: |
