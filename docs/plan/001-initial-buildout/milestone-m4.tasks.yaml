global_constraints:
  allowed_patterns:
    - "Use filepath.Walk for directory traversal"
    - "Parallel package discovery where possible"
    - "Validate package paths before processing"
    - "Handle symlinks with cycle detection"
    - "Clear progress indication for large repos"
  forbidden_patterns:
    - "Synchronous processing for large package sets"
    - "Following symlinks without cycle detection"
    - "Processing excluded directories (.git, node_modules)"
    - "Silent failures during package discovery"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - go fmt ./...
      - go vet ./...
      - go test ./...
  - stage: task-completion
    criteria:
      - All tests passing
      - Package discovery works in both modes
      - Build completes in under 5 seconds for 50 packages
      - All edge cases handled

tasks:
  - id: m4-001
    name: Implement package discovery algorithm
    description: |
      Create package discovery service that finds all packages in monorepo
      using auto or manual mode as specified in config.
    estimate_minutes: 120
    type: code
    dependencies: []
    files:
      create:
        - internal/builder/discovery.go
        - internal/builder/discovery_test.go
    instructions: |
      **Objective:**
      Implement package discovery following specification

      **Implementation Steps:**
      1. Implement DiscoverPackages(config *Config, repoRoot string) ([]string, error):
         - Check if packages contains "auto"
         - If auto: walk directory tree
         - If manual: validate explicit paths
         - Return list of package directories
      2. Implement walkForPackages(repoRoot string) ([]string, error):
         - Use filepath.Walk from root
         - Look for agent-instruction.json files
         - Exclude: .git, node_modules, .agent-instruction, .backup
         - Return directories containing agent-instruction.json
      3. Implement validatePackagePaths(paths []string, repoRoot string) ([]string, error):
         - Check each path exists
         - Check for agent-instruction.json
         - Return valid paths with warnings for invalid
      4. Add symlink cycle detection
      5. Write table-driven tests for both modes

      **Constraints:**
      - Follow algorithm: technical-requirements.yaml:416-440
      - Skip excluded directories early
      - Detect and prevent symlink cycles
      - Return sorted package list
      - See: docs/style-anchors/graph-traversal-cycle-detection.md for cycle detection

      **TDD Checklist:**
      - [ ] Write test for auto mode discovery
      - [ ] Implement walkForPackages
      - [ ] Test manual mode validation
      - [ ] Test excluded directories
      - [ ] Test symlink handling
      - [ ] All tests passing

      **Code Review:**
      Run golang-design-patterns skill to review implementation:
      ```bash
      /golang-design-patterns internal/builder/discovery.go internal/builder/discovery_test.go
      ```
      Document findings in code-reviews/[yyyy-mm-dd]-{n}.yaml

      **Validation:**
      ```bash
      go test ./internal/builder -v -run TestDiscovery
      ```
      Expected: Packages discovered correctly

    validation:
      commands:
        - go test ./internal/builder -v -run TestDiscovery
      expected_output: "PASS"
      on_failure: "Review discovery algorithm"

  - id: m4-002
    name: Implement package config composition
    description: |
      Build logic to compose final instruction set for each package by
      merging global rules with package-level rules.
    estimate_minutes: 90
    type: code
    dependencies: [m4-001]
    files:
      create:
        - internal/builder/composition.go
        - internal/builder/composition_test.go
    instructions: |
      **Objective:**
      Compose final instruction set from global and package configs

      **Implementation Steps:**
      1. Implement ComposeInstructions(globalRules, packageConfig string, ruleSvc rules.RuleService) ([]Instruction, error):
         - Resolve global rule imports
         - Load package config if exists
         - Resolve package imports
         - Merge: global instructions first, then package instructions
         - Return combined list
      2. Handle missing package config gracefully (use only global)
      3. Handle empty package config
      4. Write tests for:
         - Global only
         - Package only
         - Both global and package
         - Package importing global rules

      **Constraints:**
      - Global rules always come first
      - Package rules append after global
      - Respect import order within each
      - No deduplication

      **TDD Checklist:**
      - [ ] Write test for global-only composition
      - [ ] Implement ComposeInstructions
      - [ ] Test global + package merge
      - [ ] Test import chains
      - [ ] All tests passing

      **Code Review:**
      Run golang-design-patterns skill to review implementation:
      ```bash
      /golang-design-patterns internal/builder/composition.go internal/builder/composition_test.go
      ```
      Document findings in code-reviews/[yyyy-mm-dd]-{n}.yaml

      **Validation:**
      ```bash
      go test ./internal/builder -v -run TestComposition
      ```
      Expected: Compositions correct in all scenarios

    validation:
      commands:
        - go test ./internal/builder -v -run TestComposition
      expected_output: "PASS"
      on_failure: "Check composition logic"

  - id: m4-003
    name: Add parallel package processing
    description: |
      Implement concurrent package processing to improve performance for
      large monorepos while handling errors appropriately.
    estimate_minutes: 90
    type: code
    dependencies: [m4-002]
    files:
      create:
        - internal/builder/parallel.go
        - internal/builder/parallel_test.go
    instructions: |
      **Objective:**
      Process multiple packages concurrently for better performance

      **Implementation Steps:**
      1. Implement ProcessPackagesParallel(packages []string, processor func(string) error) error:
         - Create error group for goroutines
         - Launch goroutine for each package
         - Use semaphore to limit concurrency
         - Collect and return errors
      2. Set concurrency limit based on CPU count
      3. Implement proper error aggregation
      4. Add progress tracking (optional)
      5. Write tests verifying:
         - All packages processed
         - Errors collected correctly
         - Concurrency limits respected
         - No data races

      **Constraints:**
      - Use golang.org/x/sync/errgroup
      - Limit concurrency (e.g., GOMAXPROCS)
      - Thread-safe error collection
      - Clean shutdown on first error (optional)

      **TDD Checklist:**
      - [ ] Write test for successful parallel processing
      - [ ] Implement ProcessPackagesParallel
      - [ ] Test error handling
      - [ ] Test concurrency limits
      - [ ] Run with race detector
      - [ ] All tests passing

      **Code Review:**
      Run golang-design-patterns skill to review implementation:
      ```bash
      /golang-design-patterns internal/builder/parallel.go internal/builder/parallel_test.go
      ```
      Document findings in code-reviews/[yyyy-mm-dd]-{n}.yaml

      **Validation:**
      ```bash
      go test ./internal/builder -v -race -run TestParallel
      ```
      Expected: Parallel processing works without races

    validation:
      commands:
        - go test ./internal/builder -v -race -run TestParallel
      expected_output: "PASS"
      on_failure: "Fix concurrency issues"

  - id: m4-004
    name: Implement build command
    description: |
      Create build command that discovers packages, composes rules, and
      generates all instruction files across the monorepo.
    estimate_minutes: 120
    type: code
    dependencies: [m4-003]
    files:
      create:
        - internal/commands/build.go
        - internal/commands/build_test.go
      modify:
        - internal/commands/root.go
    instructions: |
      **Objective:**
      Implement complete build command with all features

      **Implementation Steps:**
      1. Create build command with Cobra:
         - Use: "build"
         - Short: "Build instruction files from rules"
         - Flags: --parallel, --verbose, --dry-run
      2. Implement build workflow:
         - Load .agent-instruction/config.json
         - Discover packages
         - For each package:
           - Compose instructions (global + package)
           - For each framework in config:
             - Generate CLAUDE.md or AGENTS.md
             - Write file with managed sections
         - Display summary (files updated, errors)
      3. Add verbose output showing progress
      4. Add dry-run mode (show what would be done)
      5. Write tests with mock services

      **Constraints:**
      - Must complete in under 5 seconds for 50 packages
      - Use parallel processing by default
      - Clear error messages with package context
      - See: docs/style-anchors/cobra-command-structure.md for command patterns
      - See: docs/style-anchors/file-operations.md for file generation

      **TDD Checklist:**
      - [ ] Write test for build workflow
      - [ ] Implement build command structure
      - [ ] Test package discovery integration
      - [ ] Test file generation
      - [ ] Test error handling
      - [ ] All tests passing

      **Code Review:**
      Run golang-design-patterns skill to review implementation:
      ```bash
      /golang-design-patterns internal/commands/build.go internal/commands/build_test.go
      ```
      Document findings in code-reviews/[yyyy-mm-dd]-{n}.yaml

      **Validation:**
      ```bash
      go test ./internal/commands -v -run TestBuild
      ```
      Expected: Build command works end-to-end

    validation:
