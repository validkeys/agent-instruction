implementation_plan_review:
  metadata:
    plan_files:
      - milestones.yaml
      - milestone-m0.tasks.yaml
      - milestone-m1.tasks.yaml
      - milestone-m2.tasks.yaml
      - milestone-m3.tasks.yaml
      - milestone-m4.tasks.yaml
      - milestone-m5.tasks.yaml
      - milestone-m6.tasks.yaml
      - milestone-m7.tasks.yaml
    review_date: "2026-04-13T00:00:00Z"
    reviewer: implementation-plan-review skill
    business_requirements: ./business-requirements.yaml
    technical_requirements: ./technical-requirements.yaml

  overall_scores:
    structure: 9/10
    best_practices_compliance: 7/10
    task_sizing: 10/10
    completeness: 9/10
    alignment: 10/10
    development_readiness: 8/10

  summary:
    total_milestones: 8
    total_tasks: 46
    estimated_total_duration: 14-21 days
    critical_path_duration: 14-21 days (linear dependency chain)

    task_sizing_summary:
      too_small: 0
      optimal: 46  # All tasks 30-150 minutes
      too_large: 0
      optimal_percentage: 100%

    compliance_summary:
      style_anchors_present: 8/8 milestones
      style_anchors_sufficient: 3/8 milestones (M0 has 3, others have 1)
      tdd_checklists_present: 38/38 code tasks
      drift_policies_present: 0/46 tasks (implicit through constraints)
      quality_gates_defined: yes (all milestones)

  critical_issues: []

  high_priority_issues:
    - category: style_anchors
      severity: high
      issue: "Insufficient style anchors in milestones M1, M2, M3, M4, M5, M7"
      affected_items:
        - milestone-m1.tasks.yaml (1 anchor, need 2-3)
        - milestone-m2.tasks.yaml (1 anchor, need 2-3)
        - milestone-m3.tasks.yaml (1 anchor, need 2-3)
        - milestone-m4.tasks.yaml (1 anchor, need 2-3)
        - milestone-m5.tasks.yaml (1 anchor, need 2-3)
        - milestone-m7.tasks.yaml (1 anchor but too vague)
      recommendation: |
        Add 1-2 more concrete code anchors to each milestone. Style anchors should:
        - Point to actual code files (not YAML specs)
        - Include specific line numbers
        - Show complete examples (code + tests + README where applicable)

        Suggested additions:
        - M1: Add test anchor showing file operation testing patterns
        - M2: Replace YAML anchor with actual Go import resolution code example
        - M3: Add markdown generation example and test anchor
        - M4: Replace YAML anchor with actual directory traversal code example
        - M5: Add interactive prompt example and formatting helper anchor
        - M7: Replace vague "entire repository" with specific test examples
      guidance: |
        Best practice: 2-3 style anchors per milestone task file showing:
        1. Implementation pattern example
        2. Test pattern example
        3. Documentation/usage example (where applicable)

    - category: style_anchor_quality
      severity: high
      issue: "Several style anchors point to technical-requirements.yaml instead of code"
      affected_items:
        - M2: technical-requirements.yaml:416-474
        - M4: technical-requirements.yaml:416-440
        - M6: technical-requirements.yaml:510-577
      recommendation: |
        Replace YAML specification anchors with actual code implementations for M2 and M4.
        M6 is acceptable (skill definition task) but should add example skill for reference.

        Specifically:
        - M2: Find actual cycle detection code in cobra or another Go CLI tool
        - M4: Find actual directory walker with filtering in cobra or similar
      guidance: |
        Style anchors should demonstrate "how" not "what". Specifications tell what to build;
        style anchors show how to build it using proven patterns.

  medium_priority_issues:
    - category: drift_prevention
      severity: medium
      issue: "Drift policy not explicitly stated in task instructions"
      affected_items: [all 46 tasks]
      recommendation: |
        While constraints include "forbidden_patterns", explicit drift policy statements
        could be added to critical tasks:

        Add to tasks touching >3 files:
        - m2-004 (import resolution - critical algorithm)
        - m3-004 (init command - multiple file creation)
        - m4-004 (build command - orchestration)
        - m7-008 (E2E testing - comprehensive)

        Example addition to instructions:
        "**Drift Policy:**
        - STOP if needing to modify >3 unexpected files
        - STOP if needing dependencies beyond allowed list
        - STOP and document if tests fail and fix unclear
        - Revert and report before adjusting approach"
      guidance: |
        Explicit drift statements prevent scope creep during implementation.
        Most valuable for complex orchestration and integration tasks.

    - category: file_scope
      severity: medium
      issue: "Some tasks could be more explicit about file boundaries"
      affected_items:
        - m1-006 (modifies 4 files across 2 packages)
        - m3-004 (creates 3 files, modifies 1)
        - m4-004 (creates 2 files, modifies 1)
      recommendation: |
        Make file scope constraints more prominent:
        - Add "ONLY modify these N files" to instruction constraints
        - Add "If needing to touch additional files, STOP" guidance
        - List "touch_only" files that may be read but not modified
      guidance: |
        Clear file boundaries prevent scope expansion during implementation.

  best_practices_violations:
    style_anchors:
      - issue: "M7 anchor 'entire repository' is too vague"
        affected_tasks: [milestone-m7.tasks.yaml]
        guidance: |
          Provide specific examples:
          - /Users/kydavis/Sites/ai-use-repos/cobra/cobra/cmd/helpers_test.go:1-50 (table-driven tests)
          - /Users/kydavis/Sites/ai-use-repos/cobra/.github/workflows/test.yml:1-100 (CI/CD)
          - /Users/kydavis/Sites/ai-use-repos/cobra/README.md:1-100 (documentation style)

      - issue: "Non-code anchors used where code examples needed"
        affected_tasks: [m2, m4]
        guidance: |
          Technical requirements are valuable context but not style anchors.
          Style anchors demonstrate implementation patterns through working code.

    task_sizing:
      - issue: "None - all tasks are optimally sized (30-150 minutes)"
        affected_tasks: []
        guidance: "Excellent task sizing throughout the plan."

    tdd_requirements:
      - issue: "None - TDD checklists present in all code tasks"
        affected_tasks: []
        guidance: "Strong TDD discipline throughout the plan."

    drift_prevention:
      - issue: "Implicit rather than explicit drift policies"
        affected_tasks: [all code tasks]
        guidance: |
          Consider adding explicit drift statements to complex tasks:
          - Import resolution (m2-004)
          - Package discovery (m4-001, m4-004)
          - E2E testing (m7-008)

    quality_gates:
      - issue: "None - quality gates well-defined at milestone level"
        affected_tasks: []
        guidance: "Consistent quality gates across all milestones."

  gaps:
    missing_coverage:
      requirements: []  # All FR-1 through FR-10 covered
      task_types: []    # All types present: code, test, docs, config

    missing_elements: []  # No critical gaps identified

  strong_areas:
    - "Excellent task sizing - 100% of tasks in optimal 30-150 minute range"
    - "Complete requirements coverage - all FR-1 through FR-10 mapped"
    - "Strong TDD discipline - all code tasks have TDD checklists"
    - "Clear dependency chain - logical build order from foundation to polish"
    - "Comprehensive testing - M7 includes E2E, integration, and unit tests"
    - "Well-defined quality gates - consistent across all milestones"
    - "Realistic timeline - 14-21 days matches business constraint"
    - "Single feature branch strategy appropriate for technical dependencies"

  optimization_opportunities:
    - type: style_anchor_enhancement
      description: "Add more concrete code anchors to milestones M1-M5, M7"
      benefit: "Better implementation guidance, reduced drift, faster development"
      affected_items: [M1, M2, M3, M4, M5, M7]
      effort: "30-60 minutes to research and add 1-2 anchors per milestone"

    - type: drift_policy_clarification
      description: "Add explicit drift policies to complex orchestration tasks"
      benefit: "Clearer stop criteria, better scope control, faster issue detection"
      affected_items: [m2-004, m3-004, m4-004, m7-008]
      effort: "15-30 minutes to add explicit statements to 4 tasks"

    - type: file_scope_hardening
      description: "Make file scope boundaries more explicit in multi-file tasks"
      benefit: "Prevent scope creep, clearer implementation boundaries"
      affected_items: [m1-006, m3-004, m4-004]
      effort: "10-20 minutes to clarify constraints in 3 tasks"

  specific_recommendations:
    - priority: high
      category: style_anchors
      recommendation: "Add 1-2 concrete code anchors to each milestone M1-M5, M7"
      rationale: |
        Style anchors are the primary mechanism for preventing architectural drift.
        Single anchors per milestone provide insufficient pattern guidance.
      action_items:
        - "M1: Add /Users/kydavis/Sites/ai-use-repos/cobra/cobra/cmd/helpers_test.go:20-60 showing file test patterns"
        - "M2: Find and add actual cycle detection algorithm example from Go stdlib or cobra"
        - "M3: Add markdown builder test example from cobra or similar CLI tool"
        - "M4: Find actual filepath.Walk usage with filtering from cobra codebase"
        - "M5: Add interactive prompt example from cobra/cmd/*.go"
        - "M7: Replace vague anchor with specific test, CI, and doc examples"
      estimated_effort: "60 minutes total"

    - priority: medium
      category: drift_prevention
      recommendation: "Add explicit drift policy statements to 4 complex tasks"
      rationale: |
        Complex orchestration tasks (import resolution, build, E2E) have higher
        drift risk due to interconnected components and broad scope.
      action_items:
        - "m2-004: Add drift policy for import resolution algorithm"
        - "m3-004: Add drift policy for multi-file init command"
        - "m4-004: Add drift policy for build orchestration"
        - "m7-008: Add drift policy for E2E testing scope"
      estimated_effort: "30 minutes total"

    - priority: low
      category: file_scope
      recommendation: "Clarify file scope boundaries in 3 multi-file tasks"
      rationale: |
        Tasks touching 4+ files should have explicit "ONLY these files" constraints
        to prevent scope expansion during implementation.
      action_items:
        - "m1-006: Add 'ONLY modify these 4 files' constraint"
        - "m3-004: Add 'ONLY create these 3 files, modify these 1 file' constraint"
        - "m4-004: Add clear file boundary statement"
      estimated_effort: "20 minutes total"

  readiness_assessment:
    ready_for_development: "yes-with-modifications"
    blocking_issues: 0
    high_priority_issues: 2
    medium_priority_issues: 2
    recommended_modifications: 3

    estimated_effort_to_fix:
      high_priority: "90 minutes (60m anchors + 30m drift policies)"
      medium_priority: "50 minutes (30m drift + 20m file scope)"
      total: "140 minutes (~2.5 hours)"

    timeline_impact:
      if_fixed: "14-21 days (no change - fixes are in planning phase)"
      if_not_fixed: "15-23 days (potential 1-2 day drift from insufficient anchors)"

    development_confidence:
