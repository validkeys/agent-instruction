  - id: m1-001
    name: Implement managed section parser
    status: completed
    commit: cd7a7a0
    description: |
      Create parser for HTML comment markers that identifies managed sections
      in existing instruction files and extracts user content.
    estimate_minutes: 90
    type: code
    dependencies: []
    files:
      create:
        - internal/files/managed.go
        - internal/files/managed_test.go
      touch_only:
        - testdata/claude-with-managed.md
        - testdata/claude-without-managed.md
    instructions: |
      **Objective:**
      Parse instruction files to identify and preserve managed sections

      **Implementation Steps:**
      1. Define marker constants:
         - BEGIN_MARKER = "<!-- BEGIN AGENT-INSTRUCTION -->"
         - END_MARKER = "<!-- END AGENT-INSTRUCTION -->"
      2. Implement ParseManagedContent(content string) function:
         - Find BEGIN and END markers
         - Extract user content before/after managed section
         - Return ManagedContent struct with: before, managed, after strings
      3. Implement HasManagedSection(content string) bool
      4. Handle edge cases:
         - No markers present
         - Only BEGIN marker
         - Only END marker
         - Multiple marker pairs
      5. Write table-driven tests for all cases

      **Constraints:**
      - ONLY use standard library string functions
      - Preserve all whitespace and formatting
      - Handle multi-byte characters correctly
      - Return errors for malformed markers
      - See: docs/style-anchors/file-operations.md for managed section patterns

      **TDD Checklist:**
      - [ ] Write test for content with managed section
      - [ ] Implement ParseManagedContent
      - [ ] Write test for content without markers
      - [ ] Handle edge cases
      - [ ] Test multiline content preservation
      - [ ] All tests passing

      **Style Anchor Reference:**
      See docs/style-anchors/file-operations.md and table-driven-testing.md

      **Validation:**
      ```bash
      go test ./internal/files -v -run TestParseManagedContent
      ```
      Expected: All test cases pass

    validation:
      commands:
        - go test ./internal/files -v
      expected_output: "PASS"
      on_failure: "Review parser logic and test cases"

  - id: m1-002
    name: Implement backup file creation
    status: completed
    commit: df0f0dd
    description: |
      Create service for backing up existing files before modification,
      with proper error handling and permission preservation.
    estimate_minutes: 60
    type: code
    dependencies: []
    files:
      create:
        - internal/files/backup.go
        - internal/files/backup_test.go
    instructions: |
      **Objective:**
      Safely backup files before modification to prevent data loss

      **Implementation Steps:**
      1. Implement CreateBackup(filepath string) error function:
         - Read original file
         - Get file permissions
         - Write to filepath + ".backup"
         - Preserve permissions on backup
      2. Implement BackupExists(filepath string) bool
      3. Handle edge cases:
         - File doesn't exist
         - Backup already exists (don't overwrite)
         - Permission denied
         - Disk full scenarios
      4. Write tests with temporary files

      **Constraints:**
      - ONLY create backup if original exists
      - Never overwrite existing backups
      - Preserve file permissions exactly
      - Return detailed errors
      - See: docs/style-anchors/file-operations.md for backup patterns

      **TDD Checklist:**
      - [ ] Write test for successful backup
      - [ ] Implement CreateBackup function
      - [ ] Test permission preservation
      - [ ] Test error conditions
      - [ ] All tests passing

      **Style Anchor Reference:**
      See docs/style-anchors/file-operations.md and error-handling.md

      **Validation:**
      ```bash
      go test ./internal/files -v -run TestCreateBackup
      ```
      Expected: Backup created with correct permissions

    validation:
      commands:
        - go test ./internal/files -v -run TestBackup
      expected_output: "PASS"
      on_failure: "Check file permission handling"

  - id: m1-003
    name: Implement atomic file write service
    status: completed
    commit: 69b43e1
    description: |
      Create atomic write functionality using temp files to prevent corruption
      on interruption or failure.
    estimate_minutes: 90
    type: code
    dependencies: [m1-002]
    files:
      create:
        - internal/files/atomic.go
        - internal/files/atomic_test.go
    instructions: |
      **Objective:**
      Implement atomic writes that prevent partial file corruption

      **Implementation Steps:**
      1. Implement WriteAtomic(filepath string, content []byte) error:
         - Create temp file in same directory
         - Write content to temp file
         - Sync to disk
         - Rename temp to target (atomic operation)
         - Clean up temp on error
      2. Get original permissions if file exists
      3. Apply permissions to new file
      4. Handle platform-specific atomic rename
      5. Write tests simulating interruption scenarios

      **Constraints:**
      - ONLY use os.Rename for atomicity
      - Temp file must be in same directory as target
      - Clean up temp files on all error paths
      - Preserve file permissions
      - See: docs/style-anchors/file-operations.md for atomic write patterns

      **TDD Checklist:**
      - [ ] Write test for successful atomic write
      - [ ] Implement WriteAtomic function
      - [ ] Test permission preservation
      - [ ] Test cleanup on error
      - [ ] Test concurrent writes
      - [ ] All tests passing

      **Validation:**
      ```bash
      go test ./internal/files -v -run TestWriteAtomic
      ```
      Expected: All atomicity guarantees maintained

    validation:
      commands:
        - go test ./internal/files -v -run TestAtomic
      expected_output: "PASS"
      on_failure: "Review atomic write implementation"

  - id: m1-004
    name: Create unified file service interface
    status: completed
    commit: 0c8c1ed
    description: |
      Build FileService interface and implementation that combines managed
      sections, backups, and atomic writes into a cohesive API.
    estimate_minutes: 75
    type: code
    dependencies: [m1-001, m1-002, m1-003]
    files:
      create:
        - internal/files/service.go
        - internal/files/service_test.go
    instructions: |
      **Objective:**
      Provide unified API for all file operations used by commands

      **Implementation Steps:**
      1. Define FileService interface with methods:
         - ReadFile(path string) ([]byte, error)
         - WriteFile(path string, content []byte) error
         - BackupFile(path string) error
         - ParseManaged(content []byte) (*ManagedContent, error)
         - UpdateManaged(path string, newContent string) error
      2. Create DefaultFileService struct implementing interface
      3. Implement UpdateManaged combining all operations:
         - Read existing file
         - Parse managed sections
         - Replace managed content
         - Create backup if file exists
         - Atomic write
      4. Write integration tests for full workflow

      **Constraints:**
      - Use interface for testability
      - All operations must be atomic
      - Errors must include file path context
      - Never lose user content

      **TDD Checklist:**
      - [ ] Define FileService interface
      - [ ] Write test for ReadFile
      - [ ] Implement DefaultFileService
      - [ ] Test UpdateManaged workflow
      - [ ] Test error scenarios
      - [ ] All tests passing

      **Validation:**
      ```bash
      go test ./internal/files -v
      ```
      Expected: All service tests pass

    validation:
      commands:
        - go test ./internal/files -v
      expected_output: "PASS"
      on_failure: "Check service integration"

