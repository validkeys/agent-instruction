name: agent-instruction
version: "1.0.0"
description: Manage AI instruction files in monorepos during development sessions
author: Kyle Davis

triggers:
  - "add rule"
  - "update CLAUDE.md"
  - "update AGENTS.md"
  - "list instruction rules"
  - "build instruction files"
  - "show available rules"

commands:
  - name: add_rule
    description: Add a new instruction rule to a rule file
    usage: agent-instruction add "[rule content]" --title "[title]" --rule="[rule-file]"
    parameters:
      - name: content
        type: string
        required: true
        description: The instruction rule text to add
      - name: title
        type: string
        required: false
        description: Optional heading for the rule section
      - name: rule_file
        type: string
        required: false
        description: Target rule file (e.g., "global", "testing"). Prompts interactively if omitted.
    examples:
      - description: Add a testing standard rule
        command: agent-instruction add "Always use table-driven tests in Go" --title="Testing Standards" --rule="testing"
      - description: Add a rule with interactive selection
        command: agent-instruction add "Never use global variables" --title="Code Standards"
      - description: Add a security rule
        command: agent-instruction add "Validate all user input before database queries" --rule="security"

  - name: build
    description: Generate/update all instruction files (CLAUDE.md, AGENTS.md) from rule configurations
    usage: agent-instruction build
    parameters: []
    examples:
      - description: Build all instruction files after adding rules
        command: agent-instruction build
      - description: Rebuild files to reflect rule changes
        command: agent-instruction build

  - name: list
    description: Display all available rule files and their contents
    usage: agent-instruction list [--verbose]
    parameters:
      - name: verbose
        type: boolean
        required: false
        description: Show detailed rule content with formatting
    examples:
      - description: List all rule files and summaries
        command: agent-instruction list
      - description: List rules with full content
        command: agent-instruction list --verbose

best_practices:
  - title: When to add rules
    description: Use add_rule when the user says "remember this for next time" or when you discover patterns that should be codified
  - title: Avoid duplicates
    description: Before adding a rule, check existing rules with list to avoid duplicates
  - title: Build after changes
    description: After adding multiple rules, run build to propagate changes to CLAUDE.md and AGENTS.md
  - title: Use descriptive titles
    description: Use clear, specific titles that make rules easy to find and understand later
  - title: Group related rules
    description: Group related rules in the same rule file (e.g., testing.json, security.json, golang.json)
  - title: Natural triggers
    description: Respond to natural language requests like "add a rule", "update instructions", or "remember this"

integration:
  shell_execution: true
  requires_cli: agent-instruction
  installation_check: agent-instruction --version

notes: |
  This skill requires the agent-instruction CLI to be installed and available in PATH.
  The CLI manages rule files in .agent-instruction/ directory and builds instruction
  files at repository root.
