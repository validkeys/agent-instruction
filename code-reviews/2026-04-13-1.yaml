summary: |
  This markdown builder demonstrates excellent Go craftsmanship. It solves the
  problem with minimal complexity, uses appropriate patterns (strings.Builder),
  and includes comprehensive tests. The code avoids common pitfalls like premature
  abstraction, unnecessary error handling, and complex constructors.

  The implementation correctly identifies that stateless pure functions don't need:
  - Constructors or functional options
  - Error handling (no validation, I/O, or external calls)
  - Resource management (no defer Close())
  - Complex abstractions

  Test coverage is comprehensive with edge cases, realistic scenarios, and an
  integration test. The test-to-code ratio of 4.6:1 demonstrates thorough validation.

