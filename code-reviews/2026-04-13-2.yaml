summary: |
  The managed section builder demonstrates excellent Go craftsmanship. It combines
  generated content with user content while guaranteeing no data loss - a critical
  requirement for a file management tool. The implementation uses appropriate patterns
  (strings.Builder), has comprehensive tests including dedicated validation of the
  no-loss requirement, and avoids common pitfalls like premature abstraction.

  The whitespace handling logic ensures proper formatting between content and markers,
  handling all edge cases correctly (no trailing newline, single newline, double newline).

  Critical requirements are guaranteed by design:
  - User content (Before/After) is never lost
  - Only managed section content is replaced
  - Whitespace in user content is preserved exactly
  - Consistent HTML comment markers are used

  Test coverage is comprehensive with 18 test cases across 3 test functions, including
  edge cases, integration scenarios, and explicit validation of critical requirements.

